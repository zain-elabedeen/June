replicaCount: 2

image:
  repository: gcr.io/june-api-455423/june-api
  tag: latest
  pullPolicy: Always
  pullSecrets:
    - name: gcr-pull-secret

nameOverride: ""
fullnameOverride: ""

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

config:
  ginMode: "release"
  serverPort: "8080"
  apiBaseUrl: ""
  serviceName: june-api
  db:
    host: ""
    port: "5432"
    user: ""
    name: ""
    sslMode: "disable"
  jwt:
    accessExpMinutes: "15"
    refreshExpDays: "7"

simulation:
  enabled: false
  profile: baseline
  errorEvery: "0"
  latencyMs: "0"
  timeoutEvery: "0"
  dependencyErrorEvery: "0"
  cpuBurnMs: "0"
  memoryMB: "0"
  crashAfterRequests: "0"
  probeFailureEvery: "0"

archagent:
  dependsOn: ""

secrets:
  create: false
  existingSecret: ""
  dbPassword: ""
  jwtAccessSecret: ""
  jwtRefreshSecret: ""

postgresql:
  enabled: false
  image:
    repository: postgres
    tag: 15-alpine
    pullPolicy: IfNotPresent
  auth:
    username: june_user
    database: june_db
  service:
    port: 5432
  persistence:
    enabled: true
    size: 1Gi

waitForDatabase:
  enabled: false

migrations:
  enabled: false
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  image:
    repository: june-api-migrations
    tag: dev
    pullPolicy: IfNotPresent

mockDependencies:
  enabled: false
  image:
    repository: busybox
    tag: "1.36"
    pullPolicy: IfNotPresent
  items: []

loadgen:
  enabled: false
  durationSeconds: 0
  requests: 250
  workers: 5
  route: /api/v1/sim/work
  timeoutSeconds: 2
  delaySeconds: 0
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  image:
    repository: busybox
    tag: "1.36"
    pullPolicy: IfNotPresent

probes:
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
