{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "june-api.secretName" . }}
  labels:
    {{- include "june-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_PASSWORD: {{ required "secrets.dbPassword is required when secrets.create=true" .Values.secrets.dbPassword | quote }}
  JWT_ACCESS_SECRET: {{ required "secrets.jwtAccessSecret is required when secrets.create=true" .Values.secrets.jwtAccessSecret | quote }}
  JWT_REFRESH_SECRET: {{ required "secrets.jwtRefreshSecret is required when secrets.create=true" .Values.secrets.jwtRefreshSecret | quote }}
{{- end }}
